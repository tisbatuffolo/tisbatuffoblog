<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - PandAgenda</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #2332bb;
  --accent: #ff4757;
  --bg: #f4f7fa;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --c-cibo: #ffd32a; 
  --c-giretto: #ff8c00; 
  --c-girolungo: #05c46b;
  --c-evento: #575fcf; 
  --c-compleanno: #008b8b;
  --c-festa: #ff00ff; 
  --c-nessuna: #95a5a6; 
}

body { font-family: 'Fredoka', sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }

header { background: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--stroke); }
header h1 { margin: 0; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.6rem; }
header h1 a { color: var(--primary); text-decoration: none; }

.container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; box-sizing: border-box; }

.nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
.nav-btn {
  background: var(--primary); color: white; border: 2.5px solid var(--stroke);
  width: 38px; height: 38px; border-radius: 10px; font-size: 1.2rem; cursor: pointer;
  box-shadow: 3px 3px 0 var(--stroke); transition: 0.1s;
}
.nav-btn:active { box-shadow: 1px 1px 0 var(--stroke); transform: translate(2px, 2px); }
#month-year { font-weight: 800; font-size: 1.3rem; text-transform: uppercase; }

.cal-wrapper {
  background: white; border-radius: 18px; padding: 8px;
  border: 3px solid var(--stroke); box-shadow: 5px 5px 0 rgba(0,0,0,0.05);
  margin-bottom: 20px;
}
table { width: 100%; border-collapse: separate; border-spacing: 3px; table-layout: fixed; }
th { color: #888; font-size: 0.7rem; padding-bottom: 5px; text-transform: uppercase; }
td { height: 75px; vertical-align: top; border-radius: 8px; border: 2px solid #f0f0f0; transition: 0.2s; cursor: pointer; position: relative; }

.active-day { border: 3px solid var(--primary) !important; background: #fff !important; transform: scale(1.02); z-index: 10; }

.day-box { display: flex; flex-direction: column; height: 100%; padding: 4px; box-sizing: border-box; position: relative; }
.day-num { font-size: 1rem; font-weight: 800; }
.day-label { 
    font-size: 9px; font-weight: 700; padding: 2px 4px; border-radius: 4px;
    margin-top: auto; text-align: center; color: white;
    border: 1.5px solid var(--stroke); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.today-highlight { border: 3px solid var(--accent) !important; background-color: #fff5f5 !important; }

.bg-cibo { background-color: rgba(255, 211, 42, 0.15); }
.bg-giretto { background-color: rgba(255, 140, 0, 0.15); }
.bg-girolungo { background-color: rgba(5, 196, 107, 0.15); }
.bg-evento { background-color: rgba(87, 95, 207, 0.15); }
.bg-compleanno { background-color: rgba(0, 139, 139, 0.15); }
.bg-festa { background-color: rgba(255, 0, 255, 0.15); }

.lbl-cibo { background: var(--c-cibo); color: #000; }
.lbl-giretto { background: var(--c-giretto); color: #fff; }
.lbl-girolungo { background: var(--c-girolungo); color: #fff; }
.lbl-evento { background: var(--c-evento); color: #fff; }
.lbl-compleanno { background: var(--c-compleanno); color: #fff; }
.lbl-festa { background: var(--c-festa); color: #fff; }

#save-github {
  background: var(--accent); color: white; border: 3px solid var(--stroke); padding: 12px 25px;
  border-radius: 12px; font-weight: 800; display: block; margin: 0 auto 25px auto;
  box-shadow: 4px 4px 0 var(--stroke); cursor: pointer; font-size: 1.05rem; transition: 0.1s;
}
#save-github:active { box-shadow: 1px 1px 0 var(--stroke); transform: translate(3px, 3px); }

/* Titolo Prossime Attività Ingrandito */
.section-title {
  font-size: 1.6rem; 
  font-weight: 800; 
  margin: 30px 0 15px 0; 
  border-left: 6px solid var(--primary); 
  padding-left: 12px;
  font-family: 'Outfit', sans-serif;
  color: var(--stroke);
  letter-spacing: -0.5px;
}

.activity-card {
  background: #fff; border: 2.5px solid var(--stroke); 
  border-radius: 18px; margin-bottom: 15px; position: relative;
  display: flex; align-items: center; min-height: 95px; cursor: pointer; transition: 0.2s;
}
.activity-card.selected { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(35, 50, 187, 0.2); transform: translateX(5px); }

.day-square { 
  width: 65px; align-self: stretch; border-right: 2.5px solid var(--stroke);
  border-top-left-radius: 15px; border-bottom-left-radius: 15px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
}
.day-square b { font-size: 1.4rem; line-height: 1; }
.day-square span { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; }

.activity-img { height: 90px; width: 130px; object-fit: contain; padding: 5px; flex-shrink: 0; }
.activity-info { flex-grow: 1; padding: 10px 40px 10px 8px; }
.activity-info b { font-size: 1.1rem; display: block; }

.edit-pencil {
    position: absolute; top: -10px; right: -5px;
    background: var(--stroke); color: #ffd32a; 
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; border: 2px solid white; z-index: 20;
}

/* Modale */
.overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(35, 50, 187, 0.1); backdrop-filter: blur(5px); z-index: 1000;
}
.sheet {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
  width: 88%; max-width: 380px; background: white; border-radius: 24px; 
  border: 3px solid var(--stroke); overflow: hidden;
  box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.overlay.open .sheet { transform: translate(-50%, -50%) scale(1); }

/* Tasto X Rosso con animazione rotazione */
.btn-close-modal {
  position: absolute; top: 12px; right: 12px; 
  width: 34px; height: 34px;
  background: var(--accent); color: white;
  border: 2.5px solid var(--stroke); border-radius: 50%;
  font-size: 1.4rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 30;
  box-shadow: 3px 3px 0 var(--stroke);
  transition: 0.3s;
  line-height: 0; padding-bottom: 4px;
}
.btn-close-modal:hover {
  transform: rotate(180deg);
  box-shadow: 1px 1px 0 var(--stroke);
}

.modal-img-container { 
    width: 100%; height: 160px; background: #fdfdfd; 
    border-bottom: 3px solid var(--stroke); 
    display: flex; align-items: center; justify-content: center;
}
#modal-img { max-height: 85%; max-width: 85%; object-fit: contain; }

.modal-content { padding: 20px; }
.form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.85rem; text-transform: uppercase; color: #666; }
.form-group input, .form-group select { 
    width: 100%; padding: 14px; border: 2.5px solid var(--stroke); 
    border-radius: 12px; margin-bottom: 18px; font-family: inherit; font-weight: 500;
    box-sizing: border-box; font-size: 1rem;
}

.modal-btns { display: flex; gap: 12px; margin-top: 5px; }
.modal-btns button { 
    flex: 1; padding: 15px; border-radius: 12px; font-weight: 800; 
    border: 3px solid var(--stroke); cursor: pointer; font-size: 1rem;
    transition: 0.1s; font-family: 'Outfit', sans-serif;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}

#btn-confirm { 
    background: var(--primary); color: white; 
    box-shadow: 4px 4px 0 var(--stroke);
}
#btn-confirm:active { box-shadow: 1px 1px 0 var(--stroke); transform: translate(3px, 3px); }

/* Tasto Esporta Verde */
#btn-export { 
    background: #2ecc71; color: white; display: none; 
    box-shadow: 4px 4px 0 var(--stroke);
}
#btn-export:active { box-shadow: 1px 1px 0 var(--stroke); transform: translate(3px, 3px); }

</style>
</head>

<body>
<header><h1><a href="../index.html">SbatuffoBlog - PandAgenda</a></h1></header>
<main class="container">
  <div class="nav-bar">
    <button id="prev-m" class="nav-btn">‹</button>
    <span id="month-year"></span>
    <button id="next-m" class="nav-btn">›</button>
  </div>
  
  <div class="cal-wrapper">
    <table>
      <thead><tr><th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th></tr></thead>
      <tbody id="cal-body"></tbody>
    </table>
  </div>

  <button id="save-github">Salva la PandAgenda 🚀</button>
  
  <div class="section-title">Prossime Attività</div>
  <div id="act-list"></div>
</main>

<div id="modal-overlay" class="overlay">
  <div class="sheet">
    <div id="btn-close-x" class="btn-close-modal">&times;</div>
    
    <div class="modal-img-container">
        <img id="modal-img" src="img/nessuna.png">
    </div>
    <div class="modal-content">
        <div class="form-group">
            <label>Categoria Panda</label>
            <select id="in-type">
                <option value="">nessuna</option>
                <option value="cibo">Cibo</option>
                <option value="giretto">Giretto</option>
                <option value="girolungo">Giro lungo</option>
                <option value="evento">Evento</option>
                <option value="compleanno">Compleanno</option>
                <option value="festa">Festa</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nome dell'Attività</label>
            <input id="in-name" type="text" placeholder="Cosa farà lo sbatuffolo?">
        </div>
        <div class="modal-btns">
          <button id="btn-export">Esporta 📅↓</button>
          <button id="btn-confirm">💾 SALVA</button>
        </div>
    </div>
  </div>
</div>

<script>
const today = new Date();
today.setHours(0,0,0,0);
let year = today.getFullYear();
let month = today.getMonth();
let events = {};
let selectedKey = null;

const imgMap = {
    "": "img/nessuna.png", cibo: "img/cibo.png", giretto: "img/giretto.png", 
    girolungo: "img/girolungo.png", evento: "img/evento.png", compleanno: "img/compleanno.png", festa: "img/festa.png"
};

const colorMap = {
    "": "var(--c-nessuna)", cibo: "var(--c-cibo)", giretto: "var(--c-giretto)", girolungo: "var(--c-girolungo)",
    evento: "var(--c-evento)", compleanno: "var(--c-compleanno)", festa: "var(--c-festa)"
};

const mesiNomi = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];

async function init() {
  try {
    const res = await fetch("agenda.json",{cache:"no-store"});
    events = await res.json() || {};
  } catch(e) { events = {}; }
  render();
}

function render() {
  const body = document.getElementById("cal-body");
  body.innerHTML = "";
  const first = (new Date(year, month, 1).getDay() + 6) % 7;
  const last = new Date(year, month + 1, 0).getDate();
  document.getElementById("month-year").textContent = `${mesiNomi[month]} ${year}`;

  let d = 1;
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("tr");
    for (let j = 0; j < 7; j++) {
      const cell = document.createElement("td");
      if (i === 0 && j < first || d > last) { cell.style.border="none"; cell.style.cursor="default"; }
      else {
        const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        cell.id = `td-${key}`;
        cell.onclick = () => { highlightDay(key); openModal(key); };
        
        const ev = events[key] || { nome: "", tipo: "" };
        const lblClass = ev.tipo ? `lbl-${ev.tipo}` : "lbl-nessuna";
        const bgClass = ev.nome ? (ev.tipo ? `bg-${ev.tipo}` : "bg-nessuna") : "";
        const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());

        cell.innerHTML = `
          <div class="day-box ${bgClass} ${isToday ? 'today-highlight' : ''}">
            <span class="day-num">${d}</span>
            ${ev.nome ? `<span class="day-label ${lblClass}">${ev.nome}</span>` : ''}
          </div>`;
        d++;
      }
      row.appendChild(cell);
    }
    body.appendChild(row);
    if (d > last) break;
  }
  renderList();
}

function highlightDay(key) {
    document.querySelectorAll('td').forEach(t => t.classList.remove('active-day'));
    document.getElementById(`td-${key}`)?.classList.add('active-day');
}

function renderList() {
  const list = document.getElementById("act-list");
  list.innerHTML = "";
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;

  const keys = Object.keys(events).filter(k => {
    const [y, m] = k.split("-").map(Number);
    return y === year && (m-1) === month && k >= todayStr && events[k].nome;
  }).sort();

  if(keys.length === 0) {
      list.innerHTML = "<div style='text-align:center; color:#888; padding: 20px; font-style:italic;'>Nessuna attività in programma...</div>";
      return;
  }

  keys.forEach(k => {
    const ev = events[k];
    const day = k.split("-")[2];
    const card = document.createElement("div");
    card.className = "activity-card";
    const cardColor = colorMap[ev.tipo] || "var(--c-nessuna)";
    
    card.innerHTML = `
      <div class="day-square" style="background:${cardColor}; border-right:2.5px solid var(--stroke)">
        <b>${day}</b>
        <span>${mesiNomi[month].substring(0,3)}</span>
      </div>
      <img src="${imgMap[ev.tipo]}" class="activity-img">
      <div class="activity-info">
        <b>${ev.nome}</b>
        <span>${ev.tipo || 'attività'}</span>
      </div>
      <div class="edit-pencil" onclick="event.stopPropagation(); openModal('${k}')">✎</div>
    `;

    card.onclick = () => {
        document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        highlightDay(k);
        document.getElementById(`td-${k}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    list.appendChild(card);
  });
}

function downloadICS(key) {
    const ev = events[key];
    if (!ev || !ev.nome) return;
    const dateStr = key.replace(/-/g, "");
    const startDate = new Date(key);
    const endDate = new Date(startDate);
    endDate.setDate(startDate.getDate() + 1);
    const dateEndStr = endDate.toISOString().slice(0, 10).replace(/-/g, "");

    const icsContent = [
        "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Sbatuffo//PandAgenda//IT",
        "BEGIN:VEVENT", `SUMMARY:${ev.nome}`, `DTSTART;VALUE=DATE:${dateStr}`,
        `DTEND;VALUE=DATE:${dateEndStr}`, `DESCRIPTION:Attività PandAgenda: ${ev.tipo || 'nessuna'}`,
        "END:VEVENT", "END:VCALENDAR"
    ].join("\r\n");

    const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
    const link = document.createElement("a");
    link.href = window.URL.createObjectURL(blob);
    link.download = `pandagenda_${dateStr}.ics`;
    link.click();
}

const modal = document.getElementById("modal-overlay");

function openModal(key) {
  selectedKey = key;
  const ev = events[key] || { nome: "", tipo: "" };
  document.getElementById("in-name").value = ev.nome;
  document.getElementById("in-type").value = ev.tipo || "";
  document.getElementById("modal-img").src = imgMap[ev.tipo || ""];
  
  document.getElementById("btn-export").style.display = (ev.nome && ev.nome.trim() !== "") ? "flex" : "none";
  
  modal.style.display = "block";
  setTimeout(() => modal.classList.add("open"), 10);
}

function closeModal() {
  modal.classList.remove("open");
  setTimeout(() => modal.style.display = "none", 300);
}

document.getElementById("in-type").onchange = (e) => {
    document.getElementById("modal-img").src = imgMap[e.target.value];
};

document.getElementById("btn-confirm").onclick = () => {
  const name = document.getElementById("in-name").value.trim();
  const type = document.getElementById("in-type").value;
  if(name) events[selectedKey] = { nome: name, tipo: type };
  else delete events[selectedKey];
  closeModal();
  render();
};

document.getElementById("btn-close-x").onclick = closeModal;
modal.onclick = (e) => { if (e.target === modal) closeModal(); };
document.getElementById("btn-export").onclick = () => downloadICS(selectedKey);

document.getElementById("prev-m").onclick = () => { month--; if(month<0){month=11;year--;} render(); };
document.getElementById("next-m").onclick = () => { month++; if(month>11){month=0;year++;} render(); };

document.getElementById("save-github").onclick = async () => {
  const btn = document.getElementById("save-github");
  btn.disabled = true;
  btn.innerHTML = "⏳ Salvataggio...";
  try {
      const res = await fetch("https://tisbatuffoblog.vercel.app/api/update_agendaAPI", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(events)
      });
      if (res.ok) alert("PandAgenda salvata con successo! 🐼🚀");
      else throw new Error();
  } catch(e) { alert("Errore durante il salvataggio."); }
  finally { btn.disabled = false; btn.innerHTML = "Salva la PandAgenda 🚀"; }
};

init();
</script>
</body>
</html>
