<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pandagenda</title>

<style>
  body {
    font-family: Arial, sans-serif;
  }

  header h1 {
    text-align: center;
    color: #2332bb;
  }

  .calendar-container {
    max-width: 900px;
    margin: 30px auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed; /* ✅ BLOCCA LE COLONNE */
  }

  th, td {
    border: 1px solid #ccc;
    vertical-align: top;
    padding: 4px;
    text-align: center;
  }

  th {
    background: #2366c6;
    color: white;
  }

  .day-number {
    font-weight: bold;
    margin-bottom: 4px;
  }

  textarea {
    width: 100%;
    height: 50px;
    resize: none;
    box-sizing: border-box;
    font-size: 0.85em;
  }

  button {
    padding: 6px 12px;
    margin: 6px;
  }

  #loading {
    text-align: center;
    font-style: italic;
    margin: 10px 0;
  }
</style>
</head>

<body>
<header>
  <h1>SbatuffoBlog – Pandagenda</h1>
</header>

<main class="calendar-container">
  <div style="text-align:center">
    <button id="prev-month">&lt;</button>
    <span id="month-year"></span>
    <button id="next-month">&gt;</button>
  </div>

  <div id="loading">Caricamento agenda…</div>

  <table>
    <thead>
      <tr>
        <th>Lun</th><th>Mar</th><th>Mer</th>
        <th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th>
      </tr>
    </thead>
    <tbody id="calendar-body"></tbody>
  </table>

  <button id="save-github">Salva Pandagenda</button>

  <h3>Attività del mese</h3>
  <ul id="activities-list"></ul>
</main>

<footer style="text-align:center">© 2026 Il Panda Blog</footer>

<script>
  const today = new Date();
  let year = today.getFullYear();
  let month = today.getMonth();

  const calendarBody = document.getElementById("calendar-body");
  const monthYear = document.getElementById("month-year");
  const activities = document.getElementById("activities-list");
  const loading = document.getElementById("loading");

  let events = {};

  /* ✅ CARICAMENTO ROBUSTO agenda.json */
  async function loadAgenda() {
    try {
      const res = await fetch("agenda.json", { cache: "no-store" });
      if (res.ok) {
        events = await res.json();
      } else {
        events = {};
      }
    } catch {
      events = {};
    }
  }

  function generateCalendar(y, m) {
    calendarBody.innerHTML = "";
    activities.innerHTML = "";

    const firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(y, m + 1, 0).getDate();

    monthYear.textContent =
      new Date(y, m).toLocaleString("it-IT", { month: "long", year: "numeric" });

    let date = 1;

    for (let i = 0; i < 6; i++) {
      const row = document.createElement("tr");

      for (let j = 0; j < 7; j++) {
        const cell = document.createElement("td");

        if ((i === 0 && j < firstDay) || date > daysInMonth) {
          cell.textContent = "";
        } else {
          const key = `${y}-${String(m+1).padStart(2,"0")}-${String(date).padStart(2,"0")}`;

          const num = document.createElement("div");
          num.className = "day-number";
          num.textContent = date;

          const input = document.createElement("textarea");
          input.value = events[key] || "";

          input.oninput = () => {
            events[key] = input.value;
            updateActivities();
          };

          cell.append(num, input);
          date++;
        }

        row.appendChild(cell);
      }

      calendarBody.appendChild(row);
    }

    updateActivities();
  }

  function updateActivities() {
    activities.innerHTML = "";
    let has = false;

    for (const k in events) {
      if (events[k] && events[k].trim() !== "") {
        const li = document.createElement("li");
        li.textContent = `${k}: ${events[k]}`;
        activities.appendChild(li);
        has = true;
      }
    }

    if (!has) {
      activities.innerHTML = "<li>Nessuna</li>";
    }
  }

  document.getElementById("prev-month").onclick = () => {
    month--; if (month < 0) { month = 11; year--; }
    generateCalendar(year, month);
  };

  document.getElementById("next-month").onclick = () => {
    month++; if (month > 11) { month = 0; year++; }
    generateCalendar(year, month);
  };

  document.getElementById("save-github").onclick = async () => {
    await fetch("https://tisbatuffoblog.vercel.app/api/update_agendaAPI", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(events)
    });
    alert("Agenda salvata");
  };

  /* ✅ INIT GARANTITO */
  (async () => {
    await loadAgenda();
    loading.style.display = "none";
    generateCalendar(year, month);
  })();
</script>
</body>
</html>
