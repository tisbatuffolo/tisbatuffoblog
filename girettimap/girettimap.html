<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GirettiMap - SbatuffoBlog</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* =======================================================
       CSS GENERALE E VARIABILI
       ======================================================= */
    :root {
      --main-blue: #0000ff;
      --light-blue-border: #bde0fe;
      --bg-soft: #fdfdfd;
      --heart-red: #ff4d4d;
      --color-theme: #5eb5ff; /* Colore "Giretti" salvato come variabile principale */
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: var(--bg-soft);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: #333;
    }

    main {
      flex: 1;
    }

    /* --- HEADER --- */
    header {
      background: #fff;
      padding: 25px 10px 5px;
      text-align: center;
      position: relative;
    }

    .header-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      position: relative;
      min-height: 100px; /* Assicura altezza per allineamento */
    }

    .home-link-img {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 0.2s ease;
      display: flex;
      align-items: center;
    }
    .home-link-img:hover { transform: translateY(-50%) scale(1.1); }
    .home-link-img img {
      width: clamp(70px, 12vw, 100px);
      height: auto;
    }

    .brand-title {
      font-family: 'Grandstander', cursive;
      font-weight: 900;
      font-size: clamp(2.2rem, 8vw, 4.2rem);
      color: var(--main-blue);
      margin: 0;
      line-height: 1;
      text-decoration: none;
    }

    .brand-subtitle {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: var(--color-theme); 
      font-weight: 700;
      margin-top: 5px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
    }

    /* --- DIVISORI CON CUORICINO --- */
    .section-divider {
      max-width: 250px; /* Leggermente più largo per visibilità */
      height: 3px;
      background: var(--color-theme); /* Linee del divisorio con color-theme */
      margin: 40px auto;
      border-radius: 50px;
      position: relative;
      clear: both;
      display: block; /* Garantisce il rendering */
    }
    .section-divider::after {
      content: "♥";
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-soft);
      padding: 0 15px;
      color: var(--heart-red);
      font-size: 1.5rem;
    }

    /* --- FOOTER --- */
    footer {
      background: #fff;
      padding: 20px 10px 40px;
      margin-top: 20px;
    }

    .footer-container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      max-width: 1100px;
      margin: 0 auto;
      min-height: 80px;
    }

    .footer-home {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      transition: transform 0.2s ease;
    }
    .footer-home:hover { transform: translateY(-50%) scale(1.1); }
    /* Home footer grande come header */
    .footer-home img { width: clamp(70px, 12vw, 100px); height: auto; }

    .footer-text {
      font-family: 'Grandstander', cursive;
      font-weight: 600;
      font-size: 1.2rem;
      color: #444;
      display: flex;
      align-items: center;
    }

    /* =======================================================
       STILI SPECIFICI GIRETTI MAP
       ======================================================= */
    main h2 {
      text-align: center;
      margin: 35px 0 20px;
      color: #000;
      font-family: 'Grandstander', cursive;
      font-size: clamp(1.8em, 6vw, 2.5em);
      font-weight: 900;
      letter-spacing: 1px;
    }

    /* --- TOP LINKS --- */
    .top-links {
      display: flex;
      justify-content: center;
      max-width: 1100px;
      margin: 10px auto 30px auto;
      padding: 0 15px;
      gap: 15px;
    }

    .link-box {
      flex: 1;
      padding: 20px 10px;
      border-radius: 15px;
      text-align: center;
      transition: transform 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 160px; 
      border: 2px solid transparent;
    }
    .link-box:hover { transform: translateY(-5px); }
    
    /* Colore Rosso Pastello Tenue */
    .link-box.map-box { background-color: #fff0f0; border-color: #ffdada; } 
    /* Colore Verde Pastello Tenue */
    .link-box.list-box { background-color: #f0fff4; border-color: #dcfce7;}

    .link-box a {
      text-decoration: none;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap; 
    }
    
    .link-box a span {
      font-family: 'Grandstander', cursive;
      font-weight: 900;
      font-size: clamp(0.9em, 3.5vw, 1.2em); 
      color: #000;
    }

    .link-box img { width: 100%; max-width: 110px; height: auto; margin-bottom: 12px; }

    /* --- GRID CARD --- */
    .grid-riquadri {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto 40px auto;
      padding: 0 15px;
    }

    .riquadro {
      background: #fff;
      border: 3px solid var(--color-theme); /* Contorno card con color-theme */
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
    }

    .riquadro:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 24px rgba(94, 181, 255, 0.3);
    }

    .riquadro img { width: 100%; height: 200px; object-fit: cover; display: block; flex: 1 1 auto; }
    
    .riquadro-titolo { 
      padding: 15px; 
      font-family: 'Grandstander', cursive;
      font-weight: 600; 
      text-align: center; 
      color: #000; 
      background: var(--color-theme); /* Sfondo titolo card con color-theme */
      font-size: 1.2em;
      letter-spacing: 1px;
      word-wrap: break-word;
    }

    .riquadro-link { text-decoration: none; color: inherit; display: flex; flex-direction: column; height: 100%; }
    .riquadro-link:hover .riquadro-titolo { color: #fff; text-decoration: underline; }

    /* --- CONTAGIRI SECTION --- */
    #contagiri {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 15px;
      text-align: center;
    }

    #frase-giri {
      font-family: 'Grandstander', cursive;
      font-size: clamp(1.2em, 4vw, 1.5em);
      line-height: 1.4;
      font-weight: 600;
      text-align: center;
      margin-bottom: 30px;
      color: var(--heart-red);
    }

    /* --- TABELLA --- */
    .table-container-wrapper {
      width: 100%;
      margin: 0 auto;
    }

    table#tabella-giri {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(26,50,120,0.15);
      margin-bottom: 20px;
    }

    .icon-row td {
      background-color: #ffffff !important;
      border: none !important;
      padding: 20px 5px 10px 5px !important;
      vertical-align: bottom;
    }

    .icon-row img {
      width: 100%;
      max-width: 120px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* Header tabella con sfumatura basata su color-theme */
    .header-row {
      background: linear-gradient(90deg, #3db0ff, var(--color-theme), #8dd0ff, var(--color-theme), #3db0ff); 
    }

    .header-row th {
      background: transparent;
      color: #000;
      padding: 15px 2px;
      font-family: 'Grandstander', cursive;
      font-size: clamp(0.9em, 3vw, 1.1em);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border: none;
    }

    #tabella-giri td {
      padding: 12px 2px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(0.9em, 3vw, 1.1em);
      font-weight: 400; /* Tolto grassetto */
      color: #222;
    }

    #tabella-giri tbody tr:nth-child(even) { background-color: #f4f8ff; }
    #tabella-giri tbody tr:hover { background-color: var(--light-blue-border); transition: background 0.2s ease; }

    /* --- GRAFICI --- */
    .charts-vertical-stack { margin-bottom: 20px; }
    
    .chart-wrapper { 
      width: 100%;
      height: 300px; 
      margin-top: 30px;
      margin-bottom: 60px; 
    }

    #trend-legend-custom {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      padding: 5px 0;
    }

    .legend-badge {
      padding: 4px 10px;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      font-size: 0.75em;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .legend-badge.hidden { opacity: 0.2; background-color: #ddd !important; color: #888; }

    /* --- TORTA --- */
    .torta-container {
      background: #fff;
      padding: 25px 15px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }
    
    .torta-container h3 {
      font-family: 'Grandstander', cursive;
      color: #000;
      font-size: 1.5em; /* Rimpicciolito rispetto a h2 */
      margin-top: 0;
    }

    .torta-wrapper { width: 100%; max-width: 300px; height: 300px; } /* Leggermente più piccola */

    #grid-legend {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      width: 100%;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .legend-item { 
        font-size: 0.85em; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        font-weight: 400; /* Tolto grassetto */
    }
    .legend-item strong { font-weight: 700; } /* Solo i numeri in grassetto */

    .color-box { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    .filter-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .anno-item {
      background: #f0f4ff;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 0.9em;
      font-weight: normal; /* Tolto grassetto dalle label anni */
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      border: 1px solid var(--light-blue-border);
    }

    .footer-banner {
      background-color: #eff7ff;
      border: 3px solid var(--light-blue-border);
      padding: 25px;
      border-radius: 15px;
      max-width: 1100px;
      margin: 40px auto;
      text-align: center;
    }
    
    .footer-banner h2 {
      font-family: 'Grandstander', cursive;
      color: var(--main-blue);
      margin: 0;
      font-size: clamp(1.5em, 5vw, 2.2em);
    }

    /* --- MEDIA QUERIES --- */
    @media (max-width: 1200px) {
      .grid-riquadri, #contagiri, .chart-wrapper { max-width: 980px; }
    }

    @media (max-width: 900px) {
      .grid-riquadri { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 850px) {
      .footer-home { position: absolute; left: 10px; } /* Mantenuta posizione assoluta per allineamento */
      .home-link-img { left: 10px; }
    }

    @media (max-width: 600px) {
      .grid-riquadri, #contagiri, .top-links {
        padding-left: 5px !important;
        padding-right: 5px !important;
      }
      .grid-riquadri { grid-template-columns: 1fr; }
      .icon-row img { max-width: 75px; }
      #grid-legend { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>

<body>

<header>
  <div class="header-container">
    <a href="../index.html" class="home-link-img" title="Torna alla Home">
      <img src="img/home.png" alt="Home">
    </a>
    <div class="brand-wrapper">
      <a href="../index.html" class="brand-title">SbatuffoBlog</a>
      <div class="brand-subtitle">Giretti</div>
    </div>
  </div>
</header>

<div class="section-divider"></div>

<main>
  <section class="top-links">
    <div class="link-box map-box">
      <a href="https://www.outdooractive.com/it/list/girettimap/240115709" target="_blank">
        <img src="img/pandamappa.png" alt="Mappa">
        <span>Accedi alla GirettiMap</span>
      </a>
    </div>
    <div class="link-box list-box">
      <a href="https://docs.google.com/spreadsheets/d/15UmyRWaW0getdRevefWd1xHUEjXKS36IUtUXFqK_0ds/edit?usp=drivesdk" target="_blank">

  <div class="section-divider"></div>

  <div class="section-divider"></div>

  <section id="contagiri">
    <h2>Conta Giri</h2>
    <p id="frase-giri"></p>

    <div class="table-container-wrapper">
      <table id="tabella-giri">
        <thead>
          <tr class="icon-row">
            <td style="width: 16%"></td>
            <td><img src="img/giriinsieme.png" alt=""></td>
            <td><img src="img/giretti.png" alt=""></td>
            <td><img src="img/girilunghi.png" alt=""></td>
            <td><img src="img/giriamici.png" alt=""></td>
          </tr>
          <tr class="header-row">
            <th>Anno</th>
            <th>Insieme</th>
            <th>Giretti</th>

          </tr>

          <label for="selectAll">TUTTI</label>

</main>

<footer>
    <div class="footer-container">
    <a href="../index.html" class="footer-home">
      <img src="img/home.png" alt="Home">
    </a>
    <div class="footer-text">
      @SbatuffoBlog 2026
    </div>
  </div>
</footer>

<script src="giri.js"></script>

<script>
// Logica JavaScript invariata per mantenere funzionalità
const container = document.getElementById("contenitore-giri");
if (typeof GIRI !== 'undefined') {
  GIRI.slice(0, 9).forEach(giro => {
    const card = document.createElement("div");
    card.className = "riquadro";
    const imgSrc = giro.img && giro.img !== "" ? giro.img : "https://via.placeholder.com/800x600?text=No+Image";
    card.innerHTML = `<a href="${giro.link}" target="_blank" class="riquadro-link"><div class="riquadro-titolo">${giro.titolo}</div><img src="${imgSrc}" alt="${giro.titolo}"></a>`;
    container.appendChild(card);
  });
}

const BASE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS25gFAneadaRaQQHKaNq-dZLFD0dx1mQw5nxZj7fHc2XWZH6zxHn8A4rRgPJ_XH5eujTrhTr6x36vq/pub?output=csv&gid=";
const SHEETS = { 2018: 0, 2019: 1139420899, 2020: 2024853702, 2021: 1564840008, 2022: 1211406438, 2023: 47473263, 2024: 203674235, 2025: 1106825116, 2026: 232828694 };

let datiPerAnno = {}; 
let chartTortaObj = null;
const paletteColori = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#FF63FF', '#C9CBCF', '#45f542', '#f54242', '#42f5f5', '#f5a442'];

function parseCSV(text) { return text.trim().split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g, "").trim())); }
function parseDate(str) { const [y, m, d] = str.split("/").map(Number); return new Date(y, m - 1, d); }

async function init() {
  const anniOrdinati = Object.keys(SHEETS).sort((a, b) => a - b);
  const containerAnni = document.getElementById("lista-checkbox-anni");
  let ultimaData = null;

  await Promise.all(anniOrdinati.map(async (anno) => {
    try {
      const res = await fetch(BASE_CSV + SHEETS[anno]);
      const csv = await res.text();
      const rows = parseCSV(csv).slice(1);
      let tot = rows.length, giretti = 0, lunghi = 0, amici = 0, tipi = {};
      rows.forEach(r => {
        const giorni = r[2], amiciCol = (r[3] || "").toUpperCase(), tipo = (r[6] || "Altro").trim() || "Altro";
        tipi[tipo] = (tipi[tipo] || 0) + 1;
        if (giorni === "1" || giorni === "1/2") giretti++; else if (parseFloat(giorni) > 1) lunghi++;
        if (amiciCol === "SI") amici++;
        if (r[0]) { const d = parseDate(r[0]); if (!ultimaData || d > ultimaData) ultimaData = d; }
      });
      datiPerAnno[anno] = { tot, giretti, lunghi, amici, tipi };
    } catch (e) { console.error(e); }
  }));

  anniOrdinati.slice().reverse().forEach(anno => {
    if(datiPerAnno[anno]) {
      const item = document.createElement("div");
      item.className = "anno-item";
      item.innerHTML = `<input type="checkbox" class="anno-cb" value="${anno}" checked id="cb-${anno}"><label for="cb-${anno}">${anno}</label>`;
      containerAnni.appendChild(item);
    }
  });

  const tbody = document.querySelector("#tabella-giri tbody");
  const summary = { anni: [], totali: [], giretti: [], lunghi: [], amici: [] };
  [...anniOrdinati].reverse().forEach(anno => {
    const d = datiPerAnno[anno];
    if(d) {
      summary.anni.push(anno); summary.totali.push(d.tot); summary.giretti.push(d.giretti); summary.lunghi.push(d.lunghi); summary.amici.push(d.amici);
      tbody.innerHTML += `<tr><td>${anno}</td><td>${d.tot}</td><td>${d.giretti}</td><td>${d.lunghi}</td><td>${d.amici}</td></tr>`;
    }
  });

  renderTrend(summary);
  updateTorta();
  
  document.querySelectorAll('.anno-cb').forEach(cb => cb.addEventListener('change', updateTorta));
  document.getElementById('selectAll').addEventListener('change', (e) => {
    document.querySelectorAll('.anno-cb').forEach(cb => cb.checked = e.target.checked);
    updateTorta();
  });

  if (ultimaData) {
    const diff = Math.floor((new Date().setHours(0,0,0,0) - new Date(ultimaData).setHours(0,0,0,0)) / 86400000);
    const el = document.getElementById("frase-giri");
    if (diff === 0) { el.innerText = "Che bello oggi abbiamo fatto un giro insieme!"; el.style.color = "#4caf50"; }
    else if (diff === 1) { el.innerText = "Che bello ieri abbiamo fatto un giro insieme!"; el.style.color = "#4caf50"; }
    else if (diff <= 6) { el.innerText = "Che bello questa settimana abbiamo fatto un giro insieme!"; el.style.color = "#4caf50"; }
    else { el.innerText = `Sono ben ${diff} giorni che non facciamo un giro insieme!`; el.style.color = "var(--heart-red)"; }
  }
}

function updateTorta() {
  const selectedAnni = Array.from(document.querySelectorAll('.anno-cb:checked')).map(cb => cb.value);
  let aggregatoTipi = {};
  selectedAnni.forEach(anno => {
    if(datiPerAnno[anno]) {
      const tipi = datiPerAnno[anno].tipi;
      for (let t in tipi) { aggregatoTipi[t] = (aggregatoTipi[t] || 0) + tipi[t]; }
    }
  });
  const labels = Object.keys(aggregatoTipi), valori = Object.values(aggregatoTipi);
  const ctx = document.getElementById('chartTorta').getContext('2d');
  if (chartTortaObj) chartTortaObj.destroy();
  chartTortaObj = new Chart(ctx, {
    type: 'pie',
    data: { labels: labels, datasets: [{ data: valori, backgroundColor: paletteColori, borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
  const legendGrid = document.getElementById('grid-legend');
  legendGrid.innerHTML = '';
  labels.forEach((l, i) => {
    legendGrid.innerHTML += `<div class="legend-item"><div class="color-box" style="background:${paletteColori[i % paletteColori.length]}"></div><span>${l}: <strong>${valori[i]}</strong></span></div>`;
  });
}

function renderTrend(data) {
  const ctxTrend = document.getElementById('chartTrend').getContext('2d');
  
  const datasets = [
    { label: 'Insieme', data: data.totali.slice().reverse(), color: '#2332bb', width: 3 },
    { label: 'Giretti', data: data.giretti.slice().reverse(), color: '#4caf50', width: 2 },
    { label: 'Giri Lunghi', data: data.lunghi.slice().reverse(), color: '#ff9800', width: 2 },
    { label: 'Amici', data: data.amici.slice().reverse(), color: '#e91e63', width: 2 }
  ];

  const chartTrend = new Chart(ctxTrend, {
    type: 'line',
    data: {
      labels: data.anni.slice().reverse(),
      datasets: datasets.map(d => ({
        label: d.label,
        data: d.data,
        borderColor: d.color,
        backgroundColor: d.color,
        tension: 0.3,
        borderWidth: d.width,
        pointRadius: 3
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: { bottom: 10 }
      },
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  const legendContainer = document.getElementById('trend-legend-custom');
  legendContainer.innerHTML = ''; 

  datasets.forEach((d, index) => {
    const badge = document.createElement('div');
    badge.className = 'legend-badge';
    badge.style.backgroundColor = d.color;
    badge.innerText = d.label;

    badge.onclick = () => {
      const isVisible = chartTrend.isDatasetVisible(index);
      if (isVisible) {
        chartTrend.hide(index);
        badge.classList.add('hidden');
      } else {
        chartTrend.show(index);
        badge.classList.remove('hidden');
      }
    };
    legendContainer.appendChild(badge);
  });
}

init();
</script>

</body>
</html>
