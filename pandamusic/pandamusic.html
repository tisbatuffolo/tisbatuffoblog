<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - PandaMusic</title>

<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ffcbfe; 
  --sbatuffo-blue: #0000ff; 
  --accent: #ff4757;
  --bg-soft: #fdfdfd;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --heart-red: #ff4d4d;
}

body { 
    font-family: 'Fredoka', sans-serif; 
    margin: 0; 
    background: var(--bg-soft); 
    color: var(--text); 
    overflow-x: hidden; 
}

/* --- HEADER --- */
header { background: #fff; padding: 25px 10px 15px; text-align: center; }
.header-container { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    gap: 15px; 
    flex-wrap: wrap;
}
.home-link-img img { width: clamp(50px, 12vw, 80px); height: auto; transition: transform 0.2s; }
.home-link-img:active img { transform: scale(0.9); }
.brand-title { font-family: 'Grandstander', cursive; font-weight: 900; font-size: clamp(2.2rem, 8vw, 4.2rem); color: var(--sbatuffo-blue); text-decoration: none; line-height: 1; }
.brand-subtitle { font-size: clamp(0.9rem, 3vw, 1.2rem); color: var(--primary); font-weight: 700; margin-top: 5px; text-transform: lowercase; }

/* --- DIVISORE --- */
.section-divider { max-width: 200px; height: 3px; background: var(--primary); margin: 30px auto; border-radius: 50px; position: relative; }
.section-divider::after { content: "♥"; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--bg-soft); padding: 0 15px; color: var(--heart-red); font-size: 1.5rem; }

.container { width: 100%; max-width: 700px; margin: 0 auto; padding: 15px; box-sizing: border-box; min-height: 50vh; }
.section-title { font-family: 'Grandstander', cursive; font-size: 1.9rem; font-weight: 900; margin: 20px 0 30px 0; border-left: 6px solid var(--primary); padding-left: 12px; }

/* --- PLAYLIST CARD --- */
.playlist-card {
    background: #fff;
    border: 3.5px solid var(--stroke);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 8px 8px 0 var(--primary);
    position: relative;
    overflow: hidden;
    margin-bottom: 30px;
}

.card-content { display: flex; gap: 20px; align-items: center; }

/* Base della copertina senza colore di sfondo */
.cover-art {
    width: 120px; height: 120px;
    border: 3px solid var(--stroke);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    position: relative;
    box-sizing: border-box;
    padding: 10px;
}

/* Colori specifici per le copertine */
.cover-883 { background: linear-gradient(135deg, var(--sbatuffo-blue), var(--primary)); }
.cover-cartoni { background: linear-gradient(135deg, var(--accent), #ffb8b8); }

.cover-text { 
    font-family: 'Grandstander', cursive; 
    font-weight: 900; 
    font-size: 1.6rem; 
    line-height: 1.1;
    color: #fff; 
    text-shadow: 2px 2px 0 var(--stroke); 
    text-align: center;
}

/* Colori specifici per i titoli */
.title-883 { color: var(--sbatuffo-blue); }
.title-cartoni { color: var(--accent); }

/* --- DETTAGLIO ROTELLE CASSETTA --- */
.cassette-mechanism {
    background: #e0e0e0;
    border: 3px solid var(--stroke);
    border-radius: 15px;
    margin-top: 15px;
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 60px;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
}

.reel {
    width: 50px; height: 50px;
    background: #222;
    border-radius: 50%;
    border: 4px solid #555;
    position: relative;
}

.reel::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    background: repeating-conic-gradient(from 0deg, transparent 0deg 30deg, #444 31deg 60deg);
    border-radius: 50%;
}

.spinning { animation: spinReel 2.5s linear infinite; }
@keyframes spinReel { 100% { transform: rotate(360deg); } }

/* --- BOTTONI --- */
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
.btn {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 10px 18px;
    border: 2.5px solid var(--stroke); border-radius: 12px;
    cursor: pointer; text-decoration: none; transition: 0.15s;
    box-shadow: 3px 3px 0 var(--stroke);
    display: inline-block;
    text-align: center;
}
.btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0 var(--stroke); }
.btn-link { background: #fff; color: var(--text); }
.btn-play { background: var(--primary); color: var(--stroke); }

/* --- PLAYER --- */
.player-container {
    margin-top: 20px;
    display: none;
    animation: slideDown 0.4s ease-out forwards;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

footer { background: #fff; padding: 20px 10px 40px; text-align: center; }
.footer-text { font-family: 'Grandstander', cursive; font-weight: 600; font-size: 1.2rem; color: #444; }

/* --- OTTIMIZZAZIONI SMARTPHONE --- */
@media (max-width: 600px) {
    .card-content { flex-direction: column; text-align: center; }
    .btn-group { justify-content: center; }
    .cassette-mechanism { gap: 30px; }
    .playlist-card { padding: 15px; }
}
</style>
</head>

<body>
<header>
  <div class="header-container">
    <a href="../index.html" class="home-link-img"><img src="img/home.png" alt="Home"></a>
    <div class="brand-wrapper">
      <a href="../index.html" class="brand-title">SbatuffoBlog</a>
      <div class="brand-subtitle">PandaMusic</div>
    </div>
  </div>
</header>

<div class="section-divider"></div>

<main class="container">
  <div class="section-title">Le mie playlist 🎵</div>

  <!-- PRIMA PLAYLIST: 883 -->
  <div class="playlist-card">
      <div class="card-content">
          <!-- Aggiunta classe cover-883 -->
          <div class="cover-art cover-883"><span class="cover-text">883</span></div>
          <div class="playlist-info">
              <!-- Aggiunta classe title-883 -->
              <h3 class="title-883" style="font-family: 'Grandstander'; font-size: 1.8rem; margin:0;">Max & 883 Hits</h3>
              <p style="color:#666; margin: 10px 0;"> Gli indimenticabili anni '90!</p>
              
              <div class="btn-group">
                  <a href="https://open.spotify.com/playlist/3dgqd306fvGaDcXHpXqHT2?si=jPXQwFNuScmxMZs3CTk3Eg" target="_blank" class="btn btn-link">Apri su Spotify ↗️</a>
                  <button class="btn btn-play" onclick="toggleMusic(this)">Ascolta preview 🎧</button>
              </div>
          </div>
      </div>
      <div class="cassette-mechanism">
          <div class="reel"></div>
          <div class="reel"></div>
      </div>
      <div class="player-container">
        <iframe 
            data-testid="embed-iframe" 
            style="border-radius:12px; border: 2.5px solid #000;" 
            src="https://open.spotify.com/embed/playlist/3dgqd306fvGaDcXHpXqHT2?utm_source=generator" 
            width="100%" 
            height="152" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
      </div>
  </div>

  <!-- SECONDA PLAYLIST: Cartoni Animati -->
  <div class="playlist-card">
      <div class="card-content">
          <!-- Aggiunta classe cover-cartoni -->
          <div class="cover-art cover-cartoni"><span class="cover-text">Cartoni<br>Animati</span></div>
          <div class="playlist-info">
              <!-- Aggiunta classe title-cartoni -->
              <h3 class="title-cartoni" style="font-family: 'Grandstander'; font-size: 1.8rem; margin:0;">Cartoni Animati</h3>
              <p style="color:#666; margin: 10px 0;">Le mitiche sigle della nostra infanzia!</p>
              
              <div class="btn-group">
                  <a href="https://open.spotify.com/playlist/3TKGHXuOMWHMWWKusfxsFA?si=9889dfd2330f4e1a" target="_blank" class="btn btn-link">Apri su Spotify ↗️</a>
                  <button class="btn btn-play" onclick="toggleMusic(this)">Ascolta preview 🎧</button>
              </div>
          </div>
      </div>
      <div class="cassette-mechanism">
          <div class="reel"></div>
          <div class="reel"></div>
      </div>
      <div class="player-container">
        <iframe 
            data-testid="embed-iframe" 
            style="border-radius:12px; border: 2.5px solid #000;" 
            src="https://open.spotify.com/embed/playlist/3TKGHXuOMWHMWWKusfxsFA?utm_source=generator" 
            width="100%" 
            height="152" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
      </div>
  </div>

</main>

<div class="section-divider"></div>

<footer>
    <div class="footer-text">@SbatuffoBlog 2026</div>
</footer>

<script>
function toggleMusic(btn) {
    const card = btn.closest('.playlist-card');
    const player = card.querySelector('.player-container');
    const reels = card.querySelectorAll('.reel');
    
    if (player.style.display === "none" || player.style.display === "") {
        player.style.display = "block";
        reels.forEach(r => r.classList.add("spinning"));
    } else {
        player.style.display = "none";
        reels.forEach(r => r.classList.remove("spinning"));
    }
}
</script>

</body>
</html>
