name: Aggiorna Agenda

on:
  workflow_dispatch:
  repository_dispatch:
    types: [update_agenda]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Recupera eventi dall’input
        id: events
        run: |
          echo "EVENTS_JSON=$(jq -c '.client_payload.events // {}' <<< '${{ toJson(github.event) }}')" >> $GITHUB_ENV

      - name: Scrivi agenda.js
        run: |
          echo "// Questo file è aggiornato automaticamente tramite GitHub Action" > pandagenda/agenda.js
          echo "const events = $EVENTS_JSON;" >> pandagenda/agenda.js

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pandagenda/agenda.js
          git commit -m "Aggiornamento agenda tramite GitHub Action"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}